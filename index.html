<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <table border="1" width="100%" height="100%">
    <tr>
<td width="20%" valign="top">
<div class="sidebar">
  <h2>Dashboard</h2>
  <ul>
    <li id="menuProfile">Profile</li>
    <li id="menuSecurity">Security</li>
    <li id="menuActivity">Activity</li>
  </ul>
</div>
</td>
<td width="80%" valign="top">
 <h1>User Dashboard</h1>

<!-- Profile Section -->
   <h3 id="profileSection">Profile</h3>

<div class ="profile-box">
  <form>

          <label>Name</label><br>
          <input type="text" id="name" placeholder="Telugu Krishna" required><br><br>

          <label>Email</label><br>
          <input type="email" id="email" placeholder="Mahi@gmail.com" required><br><br>

          <label>Upload Photo</label><br>
          <input type="file" id="photo" required ><br><br>

          <button type="button" id="updateProfile">Update Profile</button>
  </form>
</div>
<br>
<!-- Security Section -->

<h3 id="securitySection">Change Password</h3>

   <div class="change">
     <form>
         <label>Old Password</label><br>
         <input type="password" id="oldPassword" placeholder="Enter old password" required><br><br>

         <label>New Password</label><br>
         <input type="password" id="newPassword" placeholder="Enter new password" required><br><br>

         <label>Confirm Password</label><br>
         <input type="password" id="confirmPassword" placeholder="Confirm new password" required><br><br>

         <button type="button" id="changeBtn">Change Password</button>

     </form>
  </div>

<br>
<!-- Activity Section -->

<h3 id="activitySection">Activity Table</h3>

   <table border="1" id="activityTable">
<tr>
   <th>Date</th>
   <th>Activity</th>
</tr>
<tr>
  <td id="loginDate"></td>
  <td>Login</td>
</tr>

<tr>
  <td id="profileDate"></td>
  <td>Profile Updated</td>
</tr>

<tr>
  <td id="passwordDate"></td>
  <td>Password Changed</td>
</tr>
        </table>
      </td>
    </tr>
   </table>
  <script src="script.js"></script>
 </body>
</html>
